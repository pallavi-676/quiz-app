<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master | Premium Quiz Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div class="container">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-btn" title="Toggle Theme">
            <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
        </button>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loader"></div>
            <p>Fetching fresh questions...</p>
        </div>

        <!-- Background Elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <main class="quiz-card" id="quiz-card">
            <!-- Start Screen -->
            <section id="start-screen" class="screen active">
                <div class="hero-content">
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="hero-icon">
                            <path d="M12 2v10" />
                            <path d="M18.42 4.41a10 10 0 1 1-12.84 0" />
                        </svg>
                    </div>
                    <h1>Quiz Master</h1>
                    <p>Test your knowledge with our premium quiz experience. Fast, fun, and challenging.</p>
                    <button id="start-btn" class="btn btn-primary">Start Knowing</button>
                </div>
            </section>

            <!-- Setup Screen (Categories & Difficulty) -->
            <section id="setup-screen" class="screen">
                <div class="setup-content">
                    <h2>Setup Your Quiz</h2>

                    <div class="setup-group">
                        <label>Select Category</label>
                        <div class="selection-grid" id="category-selection">
                            <button class="select-btn active" data-category="coding">Coding</button>
                            <button class="select-btn" data-category="science">Science</button>
                            <button class="select-btn" data-category="history">History</button>
                            <button class="select-btn" data-category="math">Math</button>
                        </div>
                    </div>

                    <div class="setup-group">
                        <label>Select Difficulty</label>
                        <div class="selection-grid" id="difficulty-selection">
                            <button class="select-btn" data-difficulty="easy">Easy</button>
                            <button class="select-btn active" data-difficulty="medium">Medium</button>
                            <button class="select-btn" data-difficulty="hard">Hard</button>
                        </div>
                    </div>

                    <button id="start-quiz-btn" class="btn btn-primary">Launch Quiz</button>
                </div>
            </section>

            <!-- Quiz Screen -->
            <section id="quiz-screen" class="screen">
                <div class="quiz-header">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="quiz-info">
                        <span id="question-count">Question 1 of 5</span>
                        <div class="quiz-stats">
                            <div id="timer-container">
                                <svg class="timer-svg" viewBox="0 0 40 40">
                                    <circle class="timer-bg" cx="20" cy="20" r="18"></circle>
                                    <circle id="timer-progress" class="timer-bar" cx="20" cy="20" r="18"></circle>
                                </svg>
                                <span id="time-left">15</span>
                            </div>
                            <span id="score-display">Score: 0</span>
                        </div>
                    </div>
                </div>

                <div class="question-container">
                    <h2 id="question-text">Loading question...</h2>
                    <div id="options-container" class="options-grid">
                    </div>

                    <div id="explanation-container" class="explanation-box hidden">
                        <p id="explanation-text"></p>
                    </div>
                </div>

                <div class="quiz-footer">
                    <div class="lifelines">
                        <button id="fifty-fifty-btn" class="lifeline-btn" title="50/50">
                            <span class="lifeline-icon">½</span>
                        </button>
                        <button id="skip-btn" class="lifeline-btn" title="Skip Question">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="m6 17 5-5-5-5" />
                                <path d="m13 17 5-5-5-5" />
                            </svg>
                        </button>
                    </div>
                    <button id="next-btn" class="btn btn-secondary" disabled>Next Question</button>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="result-screen" class="screen">
                <div class="result-content">
                    <div class="result-icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="result-icon">
                            <circle cx="12" cy="12" r="10" />
                            <path d="m9 12 2 2 4-4" />
                        </svg>
                    </div>
                    <h2>Quiz Completed!</h2>
                    <div class="score-card">
                        <span class="score-label">Your final score is</span>
                        <span id="final-score" class="score-value">0 / 0</span>
                    </div>
                    <p id="result-message">Great effort! Knowledge is power.</p>
                    <div class="result-actions">
                        <button id="restart-btn" class="btn btn-primary">Try Again</button>
                        <button id="show-leaderboard-btn" class="btn btn-secondary">Leaderboard</button>
                    </div>
                </div>
            </section>

            <!-- Leaderboard Screen -->
            <section id="leaderboard-screen" class="screen">
                <div class="leaderboard-content">
                    <div class="header-with-action">
                        <h2>Top Scores</h2>
                        <button id="back-home-btn" class="icon-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </button>
                    </div>

                    <div id="leaderboard-list" class="leaderboard-list">
                    </div>

                    <button id="clear-scores-btn" class="btn btn-secondary btn-sm">Clear History</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
